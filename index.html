<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiftToTech Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f4f4f4;
}

/* Navbar */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:#111;
color:white;
}

.logo{
font-size:24px;
font-weight:bold;
}

.nav-links a{
color:white;
text-decoration:none;
margin-left:20px;
font-size:16px;
}

.nav-links a:hover{
color:#00bcd4;
}

/* Hero */

.hero{
height:350px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

.hero h1{
font-size:42px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
}

/* Products */

.container{
padding:40px 60px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:6px;
}

.card h3{
margin:15px 0;
}

.price{
font-size:18px;
font-weight:bold;
color:#27ae60;
margin-bottom:10px;
}

button{
padding:10px 20px;
border:none;
background:#111;
color:white;
cursor:pointer;
border-radius:4px;
}

button:hover{
background:#00bcd4;
}

/* Footer */

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>

</head>

<body>

<!-- Navbar -->

<div class="navbar">

<div class="logo">ShiftToTech Store</div>

<div class="nav-links">
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Categories</a>
<a href="#">Contact</a>
</div>

</div>

<!-- Hero -->

<div class="hero">

<h1>Welcome to Our Store</h1>
<p>Best Products at Best Prices</p>

</div>

<!-- Products -->

<div class="container">

<h2 style="margin-bottom:20px;">Featured Products</h2>

<div class="products">

<div class="card">
<img src="https://picsum.photos/300/200?1">
<h3>Wireless Headphones</h3>
<div class="price">$59</div>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?2">
<h3>Smart Watch</h3>
<div class="price">$99</div>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?3">
<h3>Running Shoes</h3>
<div class="price">$79</div>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?4">
<h3>Bluetooth Speaker</h3>
<div class="price">$49</div>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?5">
<h3>Gaming Mouse</h3>
<div class="price">$39</div>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?6">
<h3>Backpack</h3>
<div class="price">$45</div>
<button>Add to Cart</button>
</div>

</div>

</div>

<!-- Footer -->

<footer>

<p>© 2026 ShiftToTech Store | All Rights Reserved</p>

</footer>

</body>
</html>
